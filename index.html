<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>German Verbs · Simple Flashcards</title>
    <link rel="apple-touch-icon" href="https://play-lh.googleusercontent.com/Ih3M2AKc-PWONnoHr3cZYSA0MJgtdTBEnoaTZMsg-P4OYkMpwYWV-OUI5GoD7FnsmH0=w240-h480-rw">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f4f6fb;
            --card-bg: #ffffff;
            --text-primary: #1a1e2b;
            --text-secondary: #5b6378;
            --text-muted: #8e95a8;
            --accent: #4f6ef7;
            --accent-light: #e8ecff;
            --shadow: 0 20px 48px -12px rgba(0, 0, 0, 0.08), 0 8px 24px -6px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 32px 64px -16px rgba(0, 0, 0, 0.12);
            --radius: 24px;
            --radius-sm: 12px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            background-image: radial-gradient(circle at 20% 30%, rgba(79, 110, 247, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(79, 110, 247, 0.04) 0%, transparent 50%);
        }

        .app {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 16px 0 30px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            padding: 0 4px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .logo-icon {
            width: 42px;
            height: 42px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.5px;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }
        .header h1 span {
            font-weight: 400;
            color: var(--text-secondary);
            font-size: 0.8rem;
            display: block;
            margin-top: 1px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .badge {
            background: var(--accent-light);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }

        /* Progress */
        .progress-wrap {
            margin-bottom: 24px;
            padding: 0 4px;
        }
        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .progress-meta .count {
            color: var(--text-primary);
            font-weight: 600;
        }
        .progress-track {
            width: 100%;
            height: 4px;
            background: #e4e8f0;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), #7b93fa);
            border-radius: 40px;
            transition: width 0.4s ease;
        }

        /* Flashcard */
        .card-wrapper {
            perspective: 1200px;
            margin-bottom: 28px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .card {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 10;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            border-radius: var(--radius);
            background: transparent;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            background: var(--card-bg);
            box-shadow: var(--shadow);
            transition: box-shadow 0.3s ease;
            text-align: center;
        }
        .card-face:hover {
            box-shadow: var(--shadow-hover);
        }
        .card-front {
            z-index: 2;
        }
        .card-back {
            transform: rotateY(180deg);
            z-index: 1;
        }

        .card-face .card-word {
            font-size: 3.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            line-height: 1.1;
        }
        .card-back .card-word {
            color: var(--accent);
        }
        .card-face .card-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        .card-face .card-hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.6;
        }
        .card-face .card-hint svg {
            width: 16px;
            height: 16px;
            stroke: var(--text-muted);
            fill: none;
            stroke-width: 2;
        }

        /* Navigation */
        .nav-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 60px;
            font-family: var(--font);
            font-size: 0.875rem;
            font-weight: 500;
            background: var(--card-bg);
            color: var(--text-primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            transition: all 0.25s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            border: 1px solid transparent;
            min-width: 48px;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 16px rgba(79, 110, 247, 0.25);
            border-color: var(--accent);
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 8px 24px rgba(79, 110, 247, 0.3);
            transform: translateY(-1px);
        }
        .btn-outline {
            background: transparent;
            border-color: #e4e8f0;
            color: var(--text-secondary);
        }
        .btn-outline:hover {
            border-color: var(--text-muted);
            background: rgba(0, 0, 0, 0.02);
        }
        .btn-icon {
            padding: 12px;
            width: 48px;
            border-radius: 60px;
            flex-shrink: 0;
        }
        .btn-icon svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .btn-shuffle {
            background: var(--accent-light);
            color: var(--accent);
            border-color: transparent;
        }
        .btn-shuffle:hover {
            background: #d6defc;
        }

        .footer {
            margin-top: 28px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.2px;
            padding: 0 4px;
        }
        .footer span {
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }
            .app {
                padding: 8px 0 16px;
            }
            .header h1 {
                font-size: 1.05rem;
            }
            .header h1 span {
                font-size: 0.7rem;
            }
            .logo-icon {
                width: 36px;
                height: 36px;
                font-size: 15px;
            }
            .card-face .card-word {
                font-size: 2.6rem;
            }
            .card-face {
                padding: 24px 18px;
            }
            .btn {
                padding: 10px 16px;
                font-size: 0.8rem;
            }
            .btn-icon {
                width: 44px;
                padding: 10px;
            }
            .badge {
                font-size: 0.65rem;
                padding: 4px 10px;
            }
            .nav-controls {
                gap: 8px;
            }
            .progress-meta {
                font-size: 0.7rem;
            }
            .card {
                aspect-ratio: 16 / 11;
            }
        }

        @media (max-width: 400px) {
            .card-face .card-word {
                font-size: 2.0rem;
            }
            .card-face {
                padding: 18px 14px;
            }
            .btn {
                padding: 8px 12px;
                font-size: 0.7rem;
            }
            .btn-icon {
                width: 38px;
                padding: 8px;
            }
            .card {
                aspect-ratio: 16 / 12;
            }
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .card-wrapper {
            animation: fadeSlideUp 0.5s ease forwards;
        }
    </style>
</head>
<body>

    <div class="app" role="main">

        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo-icon" aria-hidden="true">DE</div>
                <h1>
                    Verbs
                    <span>150 flashcards</span>
                </h1>
            </div>
            <div class="header-right">
                <span class="badge" id="totalBadge">0</span>
            </div>
        </header>

        <!-- Progress -->
        <div class="progress-wrap">
            <div class="progress-meta">
                <span><span class="count" id="currentIndex">0</span> / <span id="totalCount">0</span></span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- Flashcard -->
        <div class="card-wrapper" id="cardWrapper" role="button" tabindex="0" aria-label="Flashcard, tap to flip">
            <div class="card" id="card">
                <div class="card-face card-front">
                    <span class="card-label">🇩🇪 German</span>
                    <div class="card-word" id="germanWord">—</div>
                    <div class="card-hint">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" fill="none"/><path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-linecap="round"/></svg>
                        <span>tap to flip</span>
                    </div>
                </div>
                <div class="card-face card-back">
                    <span class="card-label">🇬🇧 English</span>
                    <div class="card-word" id="englishWord">—</div>
                    <div class="card-hint">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" fill="none"/><path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-linecap="round"/></svg>
                        <span>tap to flip back</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="nav-controls" aria-label="Card navigation">
            <button class="btn btn-outline btn-icon" id="prevBtn" aria-label="Previous card">
                <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6" /></svg>
            </button>
            <button class="btn btn-outline btn-shuffle" id="shuffleBtn" aria-label="Shuffle cards">
                <svg viewBox="0 0 24 24" width="18" height="18" style="margin-right:4px;"><polyline points="16 3 21 3 21 8" /><line x1="4" y1="20" x2="21" y2="3" /><polyline points="21 16 21 21 16 21" /><line x1="15" y1="15" x2="21" y2="21" /><line x1="4" y1="4" x2="9" y2="9" /></svg>
                Shuffle
            </button>
            <button class="btn btn-primary" id="nextBtn" aria-label="Next card">
                Next
                <svg viewBox="0 0 24 24" width="18" height="18"><polyline points="9 18 15 12 9 6" /></svg>
            </button>
        </nav>

        <footer class="footer">
            <span id="currentVerbLabel">—</span> · tap the card to see the meaning
        </footer>
    </div>

    <script>
        // ——————————————————————————————————————————————
        //  150 common German verbs (infinitive + English)
        // ——————————————————————————————————————————————

        const baseVerbs = [
            // Existing 100 (from earlier)
            { de: 'sein', en: 'to be' },
            { de: 'haben', en: 'to have' },
            { de: 'werden', en: 'to become' },
            { de: 'können', en: 'can / to be able to' },
            { de: 'müssen', en: 'must / to have to' },
            { de: 'wollen', en: 'to want' },
            { de: 'sollen', en: 'should / to be supposed to' },
            { de: 'dürfen', en: 'may / to be allowed to' },
            { de: 'mögen', en: 'to like' },
            { de: 'gehen', en: 'to go' },
            { de: 'kommen', en: 'to come' },
            { de: 'sehen', en: 'to see' },
            { de: 'hören', en: 'to hear' },
            { de: 'sprechen', en: 'to speak' },
            { de: 'sagen', en: 'to say' },
            { de: 'machen', en: 'to do / to make' },
            { de: 'geben', en: 'to give' },
            { de: 'nehmen', en: 'to take' },
            { de: 'wissen', en: 'to know' },
            { de: 'denken', en: 'to think' },
            { de: 'finden', en: 'to find' },
            { de: 'bleiben', en: 'to stay' },
            { de: 'liegen', en: 'to lie (down)' },
            { de: 'sitzen', en: 'to sit' },
            { de: 'stehen', en: 'to stand' },
            { de: 'fahren', en: 'to drive / to go (by vehicle)' },
            { de: 'fliegen', en: 'to fly' },
            { de: 'laufen', en: 'to run / to walk' },
            { de: 'schwimmen', en: 'to swim' },
            { de: 'spielen', en: 'to play' },
            { de: 'arbeiten', en: 'to work' },
            { de: 'lernen', en: 'to learn' },
            { de: 'studieren', en: 'to study' },
            { de: 'verstehen', en: 'to understand' },
            { de: 'schreiben', en: 'to write' },
            { de: 'lesen', en: 'to read' },
            { de: 'essen', en: 'to eat' },
            { de: 'trinken', en: 'to drink' },
            { de: 'schlafen', en: 'to sleep' },
            { de: 'wachen', en: 'to wake' },
            { de: 'helfen', en: 'to help' },
            { de: 'danken', en: 'to thank' },
            { de: 'lieben', en: 'to love' },
            { de: 'hassen', en: 'to hate' },
            { de: 'öffnen', en: 'to open' },
            { de: 'schließen', en: 'to close' },
            { de: 'kaufen', en: 'to buy' },
            { de: 'verkaufen', en: 'to sell' },
            { de: 'bauen', en: 'to build' },
            { de: 'reparieren', en: 'to repair' },
            { de: 'anfangen', en: 'to start / begin' },
            { de: 'aufhören', en: 'to stop / cease' },
            { de: 'aussehen', en: 'to look / appear' },
            { de: 'beginnen', en: 'to begin' },
            { de: 'bekommen', en: 'to get / receive' },
            { de: 'beschreiben', en: 'to describe' },
            { de: 'besuchen', en: 'to visit' },
            { de: 'bezahlen', en: 'to pay' },
            { de: 'bringen', en: 'to bring' },
            { de: 'empfehlen', en: 'to recommend' },
            { de: 'entdecken', en: 'to discover' },
            { de: 'entscheiden', en: 'to decide' },
            { de: 'entwickeln', en: 'to develop' },
            { de: 'erklären', en: 'to explain' },
            { de: 'erlauben', en: 'to allow / permit' },
            { de: 'erzählen', en: 'to tell / narrate' },
            { de: 'fallen', en: 'to fall' },
            { de: 'fragen', en: 'to ask' },
            { de: 'gewinnen', en: 'to win' },
            { de: 'glauben', en: 'to believe' },
            { de: 'halten', en: 'to hold / stop' },
            { de: 'hängen', en: 'to hang' },
            { de: 'heißen', en: 'to be called / mean' },
            { de: 'kennen', en: 'to know (a person)' },
            { de: 'lassen', en: 'to let / allow / leave' },
            { de: 'passen', en: 'to fit / suit' },
            { de: 'planen', en: 'to plan' },
            { de: 'reden', en: 'to talk / speak' },
            { de: 'reisen', en: 'to travel' },
            { de: 'rennen', en: 'to run (fast)' },
            { de: 'schauen', en: 'to look / watch' },
            { de: 'scheinen', en: 'to seem / shine' },
            { de: 'schicken', en: 'to send' },
            { de: 'schneiden', en: 'to cut' },
            { de: 'singen', en: 'to sing' },
            { de: 'suchen', en: 'to search / look for' },
            { de: 'tragen', en: 'to carry / wear' },
            { de: 'treffen', en: 'to meet' },
            { de: 'tun', en: 'to do' },
            { de: 'überlegen', en: 'to consider / think over' },
            { de: 'vergessen', en: 'to forget' },
            { de: 'verlieren', en: 'to lose' },
            { de: 'warten', en: 'to wait' },
            { de: 'wohnen', en: 'to live / reside' },
            { de: 'zeigen', en: 'to show' },
            { de: 'ziehen', en: 'to pull / draw' },
            { de: 'brauchen', en: 'to need' },
            { de: 'feiern', en: 'to celebrate' },
            { de: 'grüßen', en: 'to greet' },

            // Additional 50 verbs to reach 150
            { de: 'antworten', en: 'to answer' },
            { de: 'bedeuten', en: 'to mean' },
            { de: 'begegnen', en: 'to meet (someone)' },
            { de: 'begleiten', en: 'to accompany' },
            { de: 'behalten', en: 'to keep' },
            { de: 'behandeln', en: 'to treat' },
            { de: 'beißen', en: 'to bite' },
            { de: 'beklagen', en: 'to complain' },
            { de: 'bemerken', en: 'to notice' },
            { de: 'beraten', en: 'to advise' },
            { de: 'berichten', en: 'to report' },
            { de: 'berühren', en: 'to touch' },
            { de: 'besitzen', en: 'to own' },
            { de: 'bestehen', en: 'to consist' },
            { de: 'betonen', en: 'to emphasize' },
            { de: 'bewegen', en: 'to move' },
            { de: 'bezweifeln', en: 'to doubt' },
            { de: 'bitten', en: 'to ask (for)' },
            { de: 'blasen', en: 'to blow' },
            { de: 'brennen', en: 'to burn' },
            { de: 'deuten', en: 'to indicate' },
            { de: 'drängen', en: 'to urge' },
            { de: 'drehen', en: 'to turn' },
            { de: 'dringen', en: 'to insist' },
            { de: 'dürfen', en: 'to be allowed' },
            { de: 'eilen', en: 'to hurry' },
            { de: 'einladen', en: 'to invite' },
            { de: 'erfahren', en: 'to experience' },
            { de: 'erinnern', en: 'to remember' },
            { de: 'erkennen', en: 'to recognize' },
            { de: 'erleben', en: 'to experience' },
            { de: 'ernähren', en: 'to nourish' },
            { de: 'ernten', en: 'to harvest' },
            { de: 'erscheinen', en: 'to appear' },
            { de: 'erwarten', en: 'to expect' },
            { de: 'erzwingen', en: 'to force' },
            { de: 'forschen', en: 'to research' },
            { de: 'führen', en: 'to lead' },
            { de: 'gelingen', en: 'to succeed' },
            { de: 'genießen', en: 'to enjoy' },
            { de: 'geschehen', en: 'to happen' },
            { de: 'gewöhnen', en: 'to get used to' },
            { de: 'gleichen', en: 'to resemble' },
            { de: 'graben', en: 'to dig' },
            { de: 'handeln', en: 'to act' },
            { de: 'hängen', en: 'to hang' },
            { de: 'heilen', en: 'to heal' },
            { de: 'hindern', en: 'to hinder' },
            { de: 'hüten', en: 'to guard' },
            { de: 'klingen', en: 'to sound' },
            { de: 'kochen', en: 'to cook' }
        ];

        // ——————————————————————————————————————————————
        //  STATE & LOGIC
        // ——————————————————————————————————————————————

        let cards = [...baseVerbs];
        let currentIndex = 0;
        let isFlipped = false;

        const cardEl = document.getElementById('card');
        const wrapper = document.getElementById('cardWrapper');
        const germanWord = document.getElementById('germanWord');
        const englishWord = document.getElementById('englishWord');
        const currentIndexEl = document.getElementById('currentIndex');
        const totalCountEl = document.getElementById('totalCount');
        const totalBadge = document.getElementById('totalBadge');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const currentVerbLabel = document.getElementById('currentVerbLabel');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');

        function renderCard() {
            const verb = cards[currentIndex];
            if (!verb) return;

            germanWord.textContent = verb.de;
            englishWord.textContent = verb.en;

            currentIndexEl.textContent = currentIndex + 1;
            totalCountEl.textContent = cards.length;
            totalBadge.textContent = cards.length;

            const pct = cards.length > 0 ? ((currentIndex + 1) / cards.length) * 100 : 0;
            progressFill.style.width = pct + '%';
            progressPercent.textContent = Math.round(pct) + '%';
            document.querySelector('.progress-track').setAttribute('aria-valuenow', pct);

            currentVerbLabel.textContent = verb.de;

            // Reset flip when changing card
            if (isFlipped) {
                cardEl.classList.remove('flipped');
                isFlipped = false;
            }

            // Re‑trigger animation
            wrapper.style.animation = 'none';
            requestAnimationFrame(() => {
                wrapper.style.animation = 'fadeSlideUp 0.4s ease forwards';
            });
        }

        function goTo(index) {
            if (index < 0) index = cards.length - 1;
            if (index >= cards.length) index = 0;
            currentIndex = index;
            renderCard();
        }

        function next() { goTo(currentIndex + 1); }

        function prev() { goTo(currentIndex - 1); }

        function shuffle() {
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            currentIndex = 0;
            renderCard();
        }

        function toggleFlip() {
            isFlipped = !isFlipped;
            cardEl.classList.toggle('flipped', isFlipped);
        }

        // ——— Event Binding ———

        wrapper.addEventListener('click', toggleFlip);
        wrapper.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                toggleFlip();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') { e.preventDefault();
                next(); } else if (e.key === 'ArrowLeft') { e.preventDefault();
                prev(); } else if (e.key === 'r' || e.key === 'R') { e.preventDefault();
                shuffle(); }
        });

        nextBtn.addEventListener('click', next);
        prevBtn.addEventListener('click', prev);
        shuffleBtn.addEventListener('click', shuffle);

        // ——— Init ———

        shuffle(); // start with shuffled deck
        renderCard();
    </script>

</body>
</html>
